[platformio]
src_dir = .firmware

[env:m5stack-atom]
platform = espressif32
board = m5stack-atom
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
build_flags =
    -D BOARD_M5STACK_ATOM
    -D CAN_DRIVER_TWAI
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0
    Links2004/WebSockets@^2.4.0

[env:m5stack-atom-swap-pins]
platform = espressif32
board = m5stack-atom
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
build_flags =
    -D BOARD_M5STACK_ATOM
    -D CAN_DRIVER_TWAI
    -D PIN_CAN_TX=19
    -D PIN_CAN_RX=22
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0
    Links2004/WebSockets@^2.4.0

[env:esp32-mcp2515]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
build_flags =
    -D BOARD_ESP32_GENERIC
    -D CAN_DRIVER_MCP2515
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0
    autowp/autowp-mcp2515@^1.3.0
    Links2004/WebSockets@^2.4.0

[env:esp32-lilygo]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
build_flags =
    -D BOARD_LILYGO
    -D CAN_DRIVER_TWAI
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0
    Links2004/WebSockets@^2.4.0

[env:waveshare-s3-can]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_build.flash_size = 8MB
board_build.flash_mode = qio
board_build.partitions = default_8MB.csv
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608

build_flags =
    -D BOARD_WAVESHARE_S3
    -D CAN_DRIVER_TWAI
    -D PIN_CAN_TX=15
    -D PIN_CAN_RX=16
    -D PIN_LED=46
    -D PIN_BUTTON=0
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1

lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0
    Links2004/WebSockets@^2.4.0
