[platformio]
src_dir = .firmware

[env:m5stack-atom]
platform = espressif32
board = m5stack-atom
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
build_flags =
    -D BOARD_M5STACK_ATOM
    -D CAN_DRIVER_TWAI
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0
    Links2004/WebSockets@^2.4.0

[env:m5stack-atom-swap-pins]
platform = espressif32
board = m5stack-atom
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
build_flags =
    -D BOARD_M5STACK_ATOM
    -D CAN_DRIVER_TWAI
    -D PIN_CAN_TX=19
    -D PIN_CAN_RX=22
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0
    Links2004/WebSockets@^2.4.0

[env:esp32-mcp2515]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
build_flags =
    -D BOARD_ESP32_GENERIC
    -D CAN_DRIVER_MCP2515
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0
    autowp/autowp-mcp2515@^1.3.0
    Links2004/WebSockets@^2.4.0

[env:esp32-lilygo]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
build_flags =
    -D BOARD_LILYGO
    -D CAN_DRIVER_TWAI
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0
    Links2004/WebSockets@^2.4.0

[env:ttgo-tdisplay]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
build_flags =
    -D BOARD_TTGO_DISPLAY
    -D CAN_DRIVER_MCP2515
    -D USER_SETUP_LOADED
    -D ST7789_DRIVER
    -D TFT_WIDTH=135
    -D TFT_HEIGHT=240
    -D TFT_MISO=-1
    -D TFT_MOSI=19
    -D TFT_SCLK=18
    -D TFT_CS=5
    -D TFT_DC=16
    -D TFT_RST=23
    -D TFT_BL=4
    -D TFT_BACKLIGHT_ON=HIGH
    -D TFT_RGB_ORDER=TFT_BGR
    -D TFT_INVERSION_ON
    -D SPI_FREQUENCY=40000000
    -D LOAD_GLCD
    -D LOAD_FONT2
    -D LOAD_FONT4
lib_deps =
    autowp/autowp-mcp2515@^1.3.0
    Links2004/WebSockets@^2.4.0
    bodmer/TFT_eSPI@^2.5.43

[env:waveshare-s3-can]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_build.flash_size = 8MB
board_build.flash_mode = qio
board_build.partitions = default_8MB.csv
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608

build_flags =
    -D BOARD_WAVESHARE_S3
    -D CAN_DRIVER_TWAI
    -D PIN_CAN_TX=15
    -D PIN_CAN_RX=16
    -D PIN_LED=46
    -D PIN_BUTTON=0
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1

lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0
    Links2004/WebSockets@^2.4.0
